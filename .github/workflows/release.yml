name: release

# On a semver tag: build, then publish a GitHub Release with the plugin .txz +
# .plg, SHA-256 checksums, cosign keyless signatures, and SLSA build provenance.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"      # stable, e.g. v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"    # pre-release, e.g. v0.1.0-alpha.1
  workflow_dispatch:
    inputs:
      tag: { description: "Release tag (vX.Y.Z[-pre])", required: true, type: string }

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      plugin_version: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      release_tag:    ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release
      id-token: write       # OIDC for cosign keyless + attestation
      attestations: write   # SLSA build provenance
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: plugin-release
          path: release

      - name: Generate SHA-256 checksums
        working-directory: release
        run: sha256sum clevis.auto.unlock-*.txz clevis.auto.unlock.plg > SHA256SUMS

      # SLSA provenance via GitHub's attestation API requires a public repo (for
      # user-owned accounts). Don't fail the release when it's unavailable — cosign
      # + SHA-256 still provide integrity; provenance starts working once public.
      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        continue-on-error: true
        with:
          subject-path: |
            release/clevis.auto.unlock-*.txz
            release/clevis.auto.unlock.plg

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Cosign keyless sign artifacts
        working-directory: release
        run: |
          shopt -s nullglob
          for f in clevis.auto.unlock-*.txz clevis.auto.unlock.plg; do
            cosign sign-blob --yes "$f" --bundle "$f.cosign.bundle"
          done

      - name: Normalize tag
        id: tag
        run: |
          tag='${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}'
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          # A hyphen in the tag (e.g. v0.1.0-alpha.1) marks a pre-release. GitHub's
          # /latest skips pre-releases, so install from the tag-specific URL.
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "install_url=https://github.com/${{ github.repository }}/releases/download/$tag/clevis.auto.unlock.plg" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "install_url=https://github.com/${{ github.repository }}/releases/latest/download/clevis.auto.unlock.plg" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            release/clevis.auto.unlock.plg
            release/clevis.auto.unlock-*.txz
            release/SHA256SUMS
            release/*.cosign.bundle
          body: |
            ## Clevis Auto-Unlock ${{ steps.tag.outputs.tag }}

            ${{ steps.tag.outputs.prerelease == 'true' && '> **Alpha / pre-release** — not yet validated on real Unraid hardware. Test on a non-critical system and keep your recovery passphrase.' || '' }}

            Install via **Plugins → Install Plugin** in Unraid with:
            ```
            ${{ steps.tag.outputs.install_url }}
            ```

            ### Verifying this release
            - SHA-256 checksums: `SHA256SUMS`
            - Cosign keyless signatures: `*.cosign.bundle` (verify with `cosign verify-blob`)
            - SLSA build provenance (public repos only): `gh attestation verify <file> --repo ${{ github.repository }}`

            See `docs/verifying-releases.md` for full instructions.
